            </div>
            <div class="actions-bottom">
                <button class="btn btn-outline" id="resetQuizBtn">🔄 重新抽题</button>
                <div class="nav-buttons">
                    <button class="btn btn-outline" id="prevBtn" disabled>← 上一题</button>
                    <button class="btn btn-primary" id="nextBtn" disabled>下一题 →</button>
                </div>
            </div>
        </div>
        <div id="resultArea" class="result-box hidden">

            </div>

            </div>

        </div>
    </div>

    <!-- 浏览模式 -->
    <div id="browseArea">
        <div class="browse-header">
            <span>📖 全部题库（共 <span id="browseTotal">0</span> 题）</span>
            <div class="browse-search">

                <span class="count" id="searchCount">显示全部</span>
            </div>
        </div>
        <div id="browseList"></div>
    </div>
</div>

// ================================================================
// 2. 解析函数：从纯文本提取题目、选项和答案
// ================================================================
function parseQuizText(text) {
    const lines = text.split('\n');
    let questions = [];
    let current = null;
    let buffer = [];

    const qHeader = /^(\d+)\.\s+(.+?)\(\s*([A-D])\s*\)/;
    const optLine = /^\s*([A-D])\.\s+(.*)/;

    for (let i = 0; i < lines.length; i++) {
        let line = lines[i].trim();
        if (!line) {
            if (current && buffer.length >= 4) {
                current.options = buffer.slice(0, 4);
                questions.push(current);
                current = null;
                buffer = [];
            }
            continue;
        }

        let headerMatch = line.match(qHeader);
        if (headerMatch) {
            if (current && buffer.length >= 4) {
                current.options = buffer.slice(0, 4);
                questions.push(current);
                current = null;
                buffer = [];
            }
            let num = parseInt(headerMatch[1]);
            let questionText = headerMatch[2].trim();
            let answer = headerMatch[3];
            questionText = questionText.replace(/\(\s*[A-D]\s*\)$/, '').trim();
            current = {
                id: num,
                question: questionText,
                answer: answer,
                options: []
            };
            continue;
        }

        let optMatch = line.match(optLine);
        if (optMatch && current) {
            let optText = optMatch[2].trim();
            buffer.push(optText);
            continue;
        }

        if (current && buffer.length === 0) {
            current.question += ' ' + line;
        }
    }

    if (current && buffer.length >= 4) {
        current.options = buffer.slice(0, 4);
        questions.push(current);
    }

    return questions;
}

// ================================================================
// 3. 答题界面逻辑（含上一题、状态保留）
// ================================================================
const QUIZ_COUNT = 40;

const loaderArea = document.getElementById('loaderArea');
const quizArea = document.getElementById('quizArea');
const browseArea = document.getElementById('browseArea');
const loadStatus = document.getElementById('loadStatus');
const scoreDisplay = document.getElementById('scoreDisplay');
const currentQDisplay = document.getElementById('currentQDisplay');
const totalQDisplay = document.getElementById('totalQDisplay');
const progressFill = document.getElementById('progressFill');
const qNumber = document.getElementById('qNumber');
const qText = document.getElementById('qText');
const optionsContainer = document.getElementById('optionsContainer');
const explanationBox = document.getElementById('explanationBox');
const explanationText = document.getElementById('explanationText');
const nextBtn = document.getElementById('nextBtn');
const prevBtn = document.getElementById('prevBtn');
const resetQuizBtn = document.getElementById('resetQuizBtn');
const retryBtn = document.getElementById('retryBtn');
const finalScore = document.getElementById('finalScore');
const finalCorrect = document.getElementById('finalCorrect');
const finalWrong = document.getElementById('finalWrong');

const modeQuizBtn = document.getElementById('modeQuiz');
const modeBrowseBtn = document.getElementById('modeBrowse');
const browseList = document.getElementById('browseList');
const browseTotal = document.getElementById('browseTotal');
const searchInput = document.getElementById('searchInput');
const searchCount = document.getElementById('searchCount');

let allQuestions = [];
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
// 存储每道题的作答状态
let answerStates = {}; // key: 全局索引, value: { selected: number | null, answered: boolean }

function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function initQuiz(questions) {
    if (!questions || questions.length === 0) {
        alert('解析失败，请检查题库格式。');
        return;
    }
    allQuestions = questions;
    browseTotal.textContent = allQuestions.length;
    renderBrowseMode(allQuestions);

    // 初始化答题
    const shuffled = shuffleArray(allQuestions);
    currentQuestions = shuffled.slice(0, Math.min(QUIZ_COUNT, shuffled.length));
    currentIndex = 0;
    score = 0;
    // 重置状态
    answerStates = {};
    currentQuestions.forEach((_, idx) => {
        answerStates[idx] = { selected: null, answered: false };
    });
    updateScoreDisplay();
    renderQuestion();
    loaderArea.style.display = 'none';
    quizArea.style.display = 'block';
    browseArea.style.display = 'none';
    document.getElementById('resultArea').classList.add('hidden');
    document.getElementById('questionContainer').style.display = 'block';
    updateNavButtons();
    modeQuizBtn.classList.add('active');
    modeBrowseBtn.classList.remove('active');
}

function renderQuestion() {
    if (currentQuestions.length === 0 || currentIndex >= currentQuestions.length) {
        showResult();
        return;
    }
    const q = currentQuestions[currentIndex];
    const state = answerStates[currentIndex];
    qNumber.textContent = `第 ${currentIndex + 1} 题（共 ${currentQuestions.length} 题）`;
    qText.textContent = q.question;
    totalQDisplay.textContent = currentQuestions.length;
    currentQDisplay.textContent = currentIndex + 1;
    updateProgress();

    optionsContainer.innerHTML = '';
    const labels = ['A', 'B', 'C', 'D'];
    q.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="prefix">${labels[idx]}.</span> ${opt}`;
        btn.dataset.index = idx;
        if (state.answered) {
            btn.classList.add('disabled');
            if (idx === q.answer.charCodeAt(0) - 65) btn.classList.add('correct');
            if (state.selected === idx && idx !== q.answer.charCodeAt(0) - 65) btn.classList.add('wrong');
        }
        btn.addEventListener('click', () => handleOptionClick(idx));
        optionsContainer.appendChild(btn);
    });

    if (state.answered) {
        explanationText.textContent = `正确答案：${q.answer}`;
        explanationBox.style.display = 'block';
        void explanationBox.offsetWidth;
        explanationBox.classList.add('show');
    } else {
        explanationBox.classList.remove('show');
        explanationBox.style.display = 'none';
    }

    isAnswered = state.answered; // 用全局变量控制
    updateNavButtons();
}

function handleOptionClick(selectedIdx) {
    const state = answerStates[currentIndex];
    if (state.answered) return;
    const q = currentQuestions[currentIndex];
    const ansIndex = q.answer.charCodeAt(0) - 65;
    const isCorrect = (selectedIdx === ansIndex);
    state.answered = true;
    state.selected = selectedIdx;
    if (isCorrect) score++;
    updateScoreDisplay();
    // 重新渲染当前题目以显示状态
    renderQuestion();
    // 更新进度（进度条基于已答题目数量）
    let answeredCount = 0;
    for (let i = 0; i < currentQuestions.length; i++) {
        if (answerStates[i] && answerStates[i].answered) answeredCount++;
    }
    const progress = (answeredCount / currentQuestions.length) * 100;
    progressFill.style.width = Math.min(progress, 100) + '%';
    // 启用/禁用按钮
    updateNavButtons();
    // 如果全部答完，显示结果
    if (answeredCount === currentQuestions.length) {
        setTimeout(() => showResult(), 300);
    }
}

function goToPrev() {
    if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
        updateNavButtons();
    }
}

function goToNext() {
    if (currentIndex < currentQuestions.length - 1) {
        currentIndex++;
        renderQuestion();
        updateNavButtons();
    } else {
        // 最后一题时，如果已答完，显示结果
        let allAnswered = true;
        for (let i = 0; i < currentQuestions.length; i++) {
            if (!answerStates[i] || !answerStates[i].answered) { allAnswered = false; break; }
        }
        if (allAnswered) {
            showResult();
        } else {
            // 否则提示
            alert('请先完成当前题目再继续。');
        }
    }
}

function updateNavButtons() {
    prevBtn.disabled = (currentIndex === 0);
    // 下一题：如果当前题目已答，或已到最后一题，禁用
    const state = answerStates[currentIndex];
    if (currentIndex === currentQuestions.length - 1) {
        // 最后一题，如果已答则禁用，否则启用（但下一题按钮在最后一题时点击会触发完成检查）
        nextBtn.disabled = !state.answered;
    } else {
        nextBtn.disabled = !state.answered;
    }
}

function showResult() {
    document.getElementById('questionContainer').style.display = 'none';
    document.getElementById('resultArea').classList.remove('hidden');
    const total = currentQuestions.length;
    const wrong = total - score;
    finalScore.textContent = score;
    finalCorrect.textContent = score;
    finalWrong.textContent = wrong;
    const circle = document.querySelector('.score-circle');
    circle.style.background = score === total ? 'linear-gradient(135deg,#22c55e,#16a34a)' : 'linear-gradient(135deg,#3b82f6,#8b5cf6)';
    prevBtn.disabled = true;
    nextBtn.disabled = true;
}

function updateScoreDisplay() { scoreDisplay.textContent = score; }

function updateProgress() {
    // 进度条基于已答题数
    let answeredCount = 0;
    for (let i = 0; i < currentQuestions.length; i++) {
        if (answerStates[i] && answerStates[i].answered) answeredCount++;
    }
    const progress = (answeredCount / currentQuestions.length) * 100;
    progressFill.style.width = Math.min(progress, 100) + '%';
}

// 浏览模式
function renderBrowseMode(questions, filterText = '') {
    const keyword = filterText.trim().toLowerCase();
    let filtered = questions;
    if (keyword) {
        filtered = questions.filter(q => {
            const searchText = (q.question + ' ' + q.options.join(' ')).toLowerCase();
            return searchText.includes(keyword);
        });
    }
    let html = '';
    filtered.forEach(q => {
        const optionsText = q.options.map((opt, idx) => {
            const label = String.fromCharCode(65 + idx);
            return `${label}. ${opt}`;
        }).join('<br>');
        html += `
            <div class="browse-item">
                <div class="browse-q">
                    <span class="browse-id">${q.id}</span>
                    ${q.question}
                </div>
                <div class="browse-options">${optionsText}</div>
                <div class="browse-answer">✅ 正确答案：${q.answer}</div>
            </div>
        `;
    });
    browseList.innerHTML = html;
    searchCount.textContent = keyword ? `找到 ${filtered.length} 题` : `显示全部 ${questions.length} 题`;
}

// 搜索事件
searchInput.addEventListener('input', function() {
    if (allQuestions.length > 0) {
        renderBrowseMode(allQuestions, this.value);
    }
});

// 切换模式
function switchMode(mode) {
    if (mode === 'quiz') {
        quizArea.style.display = 'block';
        browseArea.style.display = 'none';
        modeQuizBtn.classList.add('active');
        modeBrowseBtn.classList.remove('active');
    } else {
        quizArea.style.display = 'none';
        browseArea.style.display = 'block';
        modeQuizBtn.classList.remove('active');
        modeBrowseBtn.classList.add('active');
        if (allQuestions.length > 0 && browseList.innerHTML === '') {
            renderBrowseMode(allQuestions);
        }
    }
}

modeQuizBtn.addEventListener('click', () => switchMode('quiz'));
modeBrowseBtn.addEventListener('click', () => switchMode('browse'));

// 按钮事件
prevBtn.addEventListener('click', goToPrev);
nextBtn.addEventListener('click', goToNext);

resetQuizBtn.addEventListener('click', function() {
    if (allQuestions.length === 0) { alert('题库未加载'); return; }
    if (confirm('重新抽题，进度将丢失')) initQuiz(allQuestions);
});
retryBtn.addEventListener('click', function() {
    if (allQuestions.length === 0) return;
    initQuiz(allQuestions);
});

// 键盘快捷键
document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') {
        if (!prevBtn.disabled) goToPrev();
    } else if (e.key === 'ArrowRight') {
        if (!nextBtn.disabled) goToNext();
    } else if (e.key === 'Enter') {
        if (!nextBtn.disabled) goToNext();
    }
});

// ================================================================
// 4. 加载并启动
// ================================================================
window.addEventListener('load', function() {
    loadStatus.textContent = '⏳ 解析题库...';
    setTimeout(() => {
        try {
            const parsed = parseQuizText(QUIZ_TEXT);
            if (parsed.length > 0) {
                loadStatus.textContent = `✅ 加载成功，共 ${parsed.length} 道题`;
                initQuiz(parsed);
            } else {
                loadStatus.textContent = '❌ 解析失败，未提取到题目';
            }
        } catch (e) {
            loadStatus.textContent = `❌ 出错：${e.message}`;
            console.error(e);
        }
    }, 200);
});
</script>
